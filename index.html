<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hachette Little Heroes - AI Marker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #999999;
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: rgba(121, 121, 121, 0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .btn { background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 12px 20px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        .btn:active { opacity: 0.7; }
        .btn-admin { background-color: #e67e22; margin-top: 20px; display: none; }
        input[type="file"] { display: none; }
        .preview-img { max-width: 100%; border-radius: 10px; margin-top: 15px; display: none; }
        .result-item { display: flex; flex-direction: column; background: var(--tg-theme-bg-color); border: 1px solid var(--tg-theme-hint-color); padding: 15px; border-radius: 10px; margin-top: 10px; width: 100%; box-sizing: border-box; }
        .color-box { width: 40px; height: 40px; border-radius: 5px; margin-right: 15px; border: 1px solid #ccc; }
        .admin-panel { display: none; border: 2px dashed #e67e22; padding: 15px; margin-top: 20px; border-radius: 15px; width: 100%; box-sizing: border-box;}
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid var(--tg-theme-hint-color); box-sizing: border-box; font-size: 16px; }
        #status { font-size: 14px; margin-top: 10px; color: var(--tg-theme-hint-color); text-align: center; }
        .feedback-btns { display: flex; gap: 10px; margin-top: 15px; width: 100%; }
        
        /* Стили для Карантина */
        .pending-card { background: #ffffff; border: 2px solid #ddd; padding: 20px; margin-top: 15px; border-radius: 12px; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .pending-title { font-size: 22px; font-weight: bold; color: #e67e22; margin-bottom: 10px; text-align: center;}
        .color-preview { width: 100%; height: 80px; border-radius: 8px; margin: 10px 0; border: 2px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">AI Marker Detector</h2>

    <div id="search-section" class="card">
        <p>Сфотографируйте выкраску маркера</p>
        <button class="btn" onclick="document.getElementById('fileInput').click()">📸 Распознать маркер</button>
        <input type="file" id="fileInput" accept="image/*" onchange="processImage(this, 'analyze')">
        <img id="preview" class="preview-img">
        <div id="results"></div>
    </div>

    <button id="adminBtn" class="btn btn-admin" onclick="toggleAdminPanel()">⚙️ Панель обучения ИИ</button>

    <div id="admin-panel" class="admin-panel">
        <h3>Обучение модели (Эталон)</h3>
        <select id="adminBrandMain">
            <option value="GuangNa">GuangNa</option>
            <option value="Languo">Languo</option>
            <option value="Zibeef">Zibeef</option>
        </select>
        <input type="text" id="adminMarkerId" placeholder="Номер (напр. 611)">
        <button class="btn" style="background-color: #27ae60;" onclick="document.getElementById('adminFileInput').click()">📸 Снять эталон</button>
        <input type="file" id="adminFileInput" accept="image/*" onchange="processImage(this, 'train')">
        
        <hr style="margin: 25px 0; border: 0; border-top: 2px solid #eee;">
        
        <h3 style="text-align: center;">Очередь правок (Карантин)</h3>
        <button class="btn" style="background-color: #8e44ad;" onclick="loadPending()">🔄 Проверить новые правки</button>
        <div id="admin-pending-list"></div>
        
        <p id="adminStatus" style="font-size: 12px; margin-top: 5px;"></p>
    </div>

    <div id="status"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const MY_ID = 496779756; 
    const SERVER_URL = "https://hlhbot-hachettelittleheroes.amvera.io"; 
    let lastProcessedFile = null;

    if (tg.initDataUnsafe.user && tg.initDataUnsafe.user.id === MY_ID) {
        document.getElementById('adminBtn').style.display = 'block';
    }

    function toggleAdminPanel() {
        const panel = document.getElementById('admin-panel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    async function processImage(input, mode) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        lastProcessedFile = file; // Сохраняем фото для отправки фидбека
        
        const status = document.getElementById(mode === 'train' ? 'adminStatus' : 'status');
        status.innerText = "⏳ ИИ думает...";

        const formData = new FormData();
        formData.append('file', file);

        let endpoint = `${SERVER_URL}/analyze`;
        if (mode === 'train') {
            formData.append('brand', document.getElementById('adminBrandMain').value);
            formData.append('marker_id', document.getElementById('adminMarkerId').value);
            formData.append('admin_id', MY_ID);
            endpoint = `${SERVER_URL}/train_marker`;
        }

        try {
            const response = await fetch(endpoint, { method: 'POST', body: formData });
            const result = await response.json();
            if (mode === 'analyze') displayResults(result);
            else {
                status.innerText = result.message;
                if (result.status === 'success') alert(result.message);
            }
        } catch (e) { status.innerText = "❌ Ошибка сервера"; }
    }

    function displayResults(data) {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "";
        document.getElementById('status').innerText = "";

        if (data.status === "success" && data.palette) {
            data.palette.forEach((item) => {
                // Создаем безопасный ID для HTML элементов
                const safeId = item.marker.replace(/\s+/g, '-');
                
                resDiv.innerHTML += `
                    <div class="result-item">
                        <div style="display:flex; align-items:center;">
                            <div class="color-box" style="background-color: rgb(${item.rgb[0]},${item.rgb[1]},${item.rgb[2]})"></div>
                            <div style="font-size: 18px;"><strong>${item.marker}</strong><br><small style="color:#7f8c8d;">Уверенность: ${item.confidence}%</small></div>
                        </div>
                        <div class="feedback-btns">
                            <button class="btn" style="background:#27ae60; flex:1;" onclick="submitFeedback(true, '${item.marker}')">✅ Это он</button>
                            <button class="btn" style="background:#e74c3c; flex:1;" onclick="document.getElementById('corr-form-${safeId}').style.display='block'">❌ Ошибка</button>
                        </div>
                        <div id="corr-form-${safeId}" style="display:none; margin-top:15px; border-top: 1px solid #eee; padding-top: 10px;">
                            <p style="margin: 0 0 5px 0; font-size: 14px;">Укажите правильный маркер:</p>
                            <select id="corrBrand-${safeId}">
                                <option value="GuangNa">GuangNa</option>
                                <option value="Languo">Languo</option>
                                <option value="Zibeef">Zibeef</option>
                            </select>
                            <input type="text" id="correctId-${safeId}" placeholder="Номер (напр. 640)">
                            <button class="btn" style="background:#34495e;" onclick="submitFeedback(false, '${item.marker}')">Отправить в базу</button>
                        </div>
                    </div>`;
            });
        } else { document.getElementById('status').innerText = "Маркер не узнан."; }
    }

    async function submitFeedback(isCorrect, predictedFullId) {
        if (!lastProcessedFile) return;
        
        let brand = "";
        let markerId = "";
        const safeId = predictedFullId.replace(/\s+/g, '-');

        if (isCorrect) {
            // Если юзер подтвердил, аккуратно разделяем "GuangNa 640" на "GuangNa" и "640"
            const parts = predictedFullId.split(' ');
            brand = parts[0];
            markerId = parts.slice(1).join(' '); // на случай если номер состоит из нескольких слов
        } else {
            // Если юзер исправляет, берем данные из его формы
            brand = document.getElementById(`corrBrand-${safeId}`).value;
            markerId = document.getElementById(`correctId-${safeId}`).value;
            if (!markerId) return alert("Введите номер маркера!");
        }

        const formData = new FormData();
        formData.append('file', lastProcessedFile);
        formData.append('brand', brand);
        formData.append('marker_id', markerId);
        
        document.getElementById('status').innerText = "⏳ Отправка отзыва...";
        
        try {
            const response = await fetch(`${SERVER_URL}/submit_correction`, { method: 'POST', body: formData });
            const res = await response.json();
            alert(res.message);
            document.getElementById('results').innerHTML = ""; // Очищаем после отправки
            document.getElementById('status').innerText = "";
        } catch (e) { alert("Ошибка отправки соединения с сервером"); }
    }

    // --- ФУНКЦИИ АДМИНА ДЛЯ КАРАНТИНА ---
    async function loadPending() {
        const list = document.getElementById('admin-pending-list');
        list.innerText = "Загрузка...";
        try {
            const response = await fetch(`${SERVER_URL}/get_pending?admin_id=${MY_ID}`);
            const data = await response.json();
            list.innerHTML = data.length === 0 ? "<p style='text-align:center;'>Очередь пуста. Все проверено! 🎉</p>" : "";
            
            data.forEach((item, idx) => {
                list.innerHTML += `
                    <div class="pending-card">
                        <div class="pending-title">${item.brand} №${item.marker_id}</div>
                        <div style="text-align: center; color: #555;">Цвет с фото пользователя:</div>
                        <div class="color-preview" style="background: rgb(${item.rgb[0]},${item.rgb[1]},${item.rgb[2]});"></div>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <button class="btn" style="background:#2ecc71; padding:12px; flex:1;" onclick="moderate(${idx}, 'approve')">✅ Принять</button>
                            <button class="btn" style="background:#e74c3c; padding:12px; flex:1;" onclick="moderate(${idx}, 'reject')">🗑 Удалить</button>
                        </div>
                    </div>`;
            });
        } catch (e) { list.innerText = "Ошибка загрузки списка"; }
    }

    async function moderate(index, action) {
        try {
            const response = await fetch(`${SERVER_URL}/moderate?admin_id=${MY_ID}&index=${index}&action=${action}`, {method: 'POST'});
            const res = await response.json();
            alert(res.message);
            loadPending(); // Перезагружаем список после действия
        } catch (e) {
            alert("Ошибка при модерации");
        }
    }
</script>
</body>
</html>
